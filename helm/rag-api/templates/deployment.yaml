apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "rag-api.fullname" . }}
  labels:
    {{- include "rag-api.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "rag-api.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "rag-api.selectorLabels" . | nindent 8 }}
      annotations:
        {{- if .Values.prometheus.scrape }}
        prometheus.io/scrape: "true"
        prometheus.io/port: {{ .Values.prometheus.port | quote }}
        prometheus.io/path: {{ .Values.prometheus.path | quote }}
        {{- end }}
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      containers:
        - name: {{ .Chart.Name }}
          image: {{ include "rag-api.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
              protocol: TCP
          env:
            {{- range $k, $v := .Values.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
            - name: GCP_PROJECT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secretName }}
                  key: gcp_project_id
            - name: REDIS_HOST
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secretName }}
                  key: redis_host
            - name: VECTOR_SEARCH_INDEX_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secretName }}
                  key: vector_search_index_id
            - name: VECTOR_SEARCH_ENDPOINT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secretName }}
                  key: vector_search_endpoint_id
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
