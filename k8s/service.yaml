apiVersion: v1
kind: Service
metadata:
  name: rag-api
  labels:
    app: rag-api
spec:
  selector:
    app: rag-api
  ports:
    - name: http
      port: 80
      targetPort: 8080
  type: ClusterIP
---
# Ingress exposes the API externally via nginx with TLS termination.
# Using Ingress over LoadBalancer: one LB per cluster vs one per service —
# at scale this avoids provisioning 10+ cloud LBs (cost + IP exhaustion).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rag-api
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-body-size: "16m"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - rag-api.llmops-495904.example.com
      secretName: rag-api-tls
  rules:
    - host: rag-api.llmops-495904.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: rag-api
                port:
                  number: 80
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: rag-api
  labels:
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app: rag-api
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
