apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-api
  labels:
    app: rag-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: rag-api
  template:
    metadata:
      labels:
        app: rag-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: rag-api  # Workload Identity bound to GCP SA
      containers:
        - name: rag-api
          image: REGISTRY/rag-api:latest  # replaced by CD pipeline
          ports:
            - containerPort: 8080
          env:
            - name: GCP_PROJECT_ID
              valueFrom:
                secretKeyRef:
                  name: rag-config
                  key: gcp_project_id
            - name: REDIS_HOST
              valueFrom:
                secretKeyRef:
                  name: rag-config
                  key: redis_host
            - name: USE_VERTEX_VECTOR_SEARCH
              value: "true"
            - name: VECTOR_SEARCH_INDEX_ID
              valueFrom:
                secretKeyRef:
                  name: rag-config
                  key: vector_search_index_id
            - name: VECTOR_SEARCH_ENDPOINT_ID
              valueFrom:
                secretKeyRef:
                  name: rag-config
                  key: vector_search_endpoint_id
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "4Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: rag-api
  annotations:
    iam.gke.io/gcp-service-account: rag-api-sa@PROJECT_ID.iam.gserviceaccount.com
