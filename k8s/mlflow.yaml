apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow
  labels:
    app: mlflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlflow
  template:
    metadata:
      labels:
        app: mlflow
    spec:
      serviceAccountName: rag-api
      containers:
        - name: mlflow
          image: ghcr.io/mlflow/mlflow:v2.13.2
          command:
            - sh
            - -c
            - |
              pip install --quiet "google-cloud-storage" "protobuf>=3.12.0,<5" && \
              mlflow server \
                --host=0.0.0.0 \
                --port=5000 \
                --backend-store-uri=sqlite:////mlflow/mlflow.db \
                --default-artifact-root=gs://$(GCS_PROCESSED_BUCKET)/mlflow-artifacts
          ports:
            - containerPort: 5000
          env:
            - name: GCS_PROCESSED_BUCKET
              valueFrom:
                secretKeyRef:
                  name: rag-config
                  key: gcs_processed_bucket
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "2Gi"
          volumeMounts:
            - name: mlflow-data
              mountPath: /mlflow
      volumes:
        - name: mlflow-data
          persistentVolumeClaim:
            claimName: mlflow-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mlflow-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: mlflow
spec:
  selector:
    app: mlflow
  ports:
    - port: 5000
      targetPort: 5000
  type: LoadBalancer
